<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת ספרים לשנה"ל תשפ"ז</title>
    <!-- פונט Heebo לקריאות מעולה וחדה -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- שימוש ב-Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Heebo', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* רקע כהה עמוק ויוקרתי המונע החזרי אור ומעייף פחות את העיניים */
        body {
            background-color: #0a0a0c;
            background-image: 
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at bottom right, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }
        /* אפקט מעבר חד ויוקרתי לכרטיסיות הקונטרסטיות */
        .contrast-card {
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        /* אפקטי זוהר (Neon Glow) ייחודיים לכל כרטיסייה במעבר עכבר */
        .glow-emerald:hover {
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            transform: scale(1.02);
        }
        .glow-cyan:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
            transform: scale(1.02);
        }
        .glow-violet:hover {
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
            transform: scale(1.02);
        }
        .glow-rose:hover {
            border-color: #f43f5e;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.3);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="flex flex-col justify-between p-6 md:p-12 font-sans text-neutral-100">

    <!-- תוכן ראשי מקונטרס -->
    <main class="max-w-5xl mx-auto w-full my-auto flex flex-col items-center">
        
        <!-- כותרת עליונה בעיצוב קונטרסטי מודרני -->
        <header class="text-center mb-12 md:mb-16">
            <div class="inline-flex items-center justify-center p-3.5 bg-neutral-900 border border-neutral-800 rounded-2xl mb-5 text-indigo-400 shadow-xl">
                <!-- אייקון ספר מעוצב בצורה חדה -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-white tracking-tight mb-4">
                רשימת ספרים <span class="bg-gradient-to-l from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">תשפ"ז</span>
            </h1>
            <p class="text-neutral-400 text-base md:text-lg font-normal max-w-sm mx-auto">
                לצפייה ברשימה המעודכנת, בחרו את שכבת הלימוד שלכם:
            </p>
        </header>

        <!-- גריד כפתורי שכבות קונטרסטיים -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full px-2">

            <!-- שכבה ט' - ירוק ניאון -->
            <a href="https://docs.google.com/spreadsheets/d/1p2BPyLkiAiEFy5ZVMQp4nM0H0nEAMCUutqmPx1OdTsc/edit?usp=sharing" 
               target="_blank" 
               class="contrast-card glow-emerald bg-neutral-900/90 border-2 border-neutral-800 rounded-2xl p-6 text-center shadow-2xl block">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-emerald-500/10 text-emerald-400 mb-5 font-bold text-3xl border border-emerald-500/20">
                    ט'
                </div>
                <h2 class="text-xl font-bold text-white mb-1">שכבה ט'</h2>
                <p class="text-neutral-500 text-xs mb-6">קובץ רשימת הספרים</p>
                <div class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-emerald-500 text-neutral-950 font-bold text-sm hover:bg-emerald-400 transition-colors w-full">
                    <span>פתיחת מסמך</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </div>
            </a>

            <!-- שכבה י' - כחול/תכלת ניאון -->
            <a href="https://docs.google.com/spreadsheets/d/1nIYLv-nwVorB2hN7JrZA9u4vrVjkx4DJ8F0O14nvwpc/edit?usp=sharing" 
               target="_blank" 
               class="contrast-card glow-cyan bg-neutral-900/90 border-2 border-neutral-800 rounded-2xl p-6 text-center shadow-2xl block">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-cyan-500/10 text-cyan-400 mb-5 font-bold text-3xl border border-cyan-500/20">
                    י'
                </div>
                <h2 class="text-xl font-bold text-white mb-1">שכבה י'</h2>
                <p class="text-neutral-500 text-xs mb-6">קובץ רשימת הספרים</p>
                <div class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-cyan-500 text-neutral-950 font-bold text-sm hover:bg-cyan-400 transition-colors w-full">
                    <span>פתיחת מסמך</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </div>
            </a>

            <!-- שכבה י"א - סגול ניאון -->
            <a href="https://docs.google.com/spreadsheets/d/1aCFHt61SVz-oQb7ze9x_4QVnOELiiIO5Uu4UHvT5pa8/edit?usp=sharing" 
               target="_blank" 
               class="contrast-card glow-violet bg-neutral-900/90 border-2 border-neutral-800 rounded-2xl p-6 text-center shadow-2xl block">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-violet-500/10 text-violet-400 mb-5 font-bold text-2xl border border-violet-500/20">
                    י"א
                </div>
                <h2 class="text-xl font-bold text-white mb-1">שכבה י"א</h2>
                <p class="text-neutral-500 text-xs mb-6">קובץ רשימת הספרים</p>
                <div class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-violet-500 text-neutral-950 font-bold text-sm hover:bg-violet-400 transition-colors w-full">
                    <span>פתיחת מסמך</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </div>
            </a>

            <!-- שכבה י"ב - ורוד ניאון -->
            <a href="https://docs.google.com/spreadsheets/d/1QaV45qSJTTS7iw3X6KidBiZhxCHffZX1E3D7gVJ-ImA/edit?usp=sharing" 
               target="_blank" 
               class="contrast-card glow-rose bg-neutral-900/90 border-2 border-neutral-800 rounded-2xl p-6 text-center shadow-2xl block">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-rose-500/10 text-rose-400 mb-5 font-bold text-2xl border border-rose-500/20">
                    י"ב
                </div>
                <h2 class="text-xl font-bold text-white mb-1">שכבה י"ב</h2>
                <p class="text-neutral-500 text-xs mb-6">קובץ רשימת הספרים</p>
                <div class="inline-flex items-center justify-center px-5 py-3 rounded-xl bg-rose-500 text-neutral-950 font-bold text-sm hover:bg-rose-400 transition-colors w-full">
                    <span>פתיחת מסמך</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </div>
            </a>

        </div>

    </main>

    <!-- תחתית הדף (פוטר) קונטרסטי ומינימליסטי -->
    <footer class="text-center text-xs text-neutral-600 mt-16 mb-2 tracking-wider">
        <p>© כל הזכויות שמורות • שנה"ל תשפ"ז</p>
    </footer>

</body>
</html>
